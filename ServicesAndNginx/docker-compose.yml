# docker-compose.yml
#
# Блок services - описание всех контейнеров
services:
  #
  # Коллектор логов
  collector_service:
    build:
      context: .
      dockerfile: CollectorService/Dockerfile
      #
      args:
        - SERVICE_PORT=${COLLECTOR_SERVICE_PORT}
    #
    container_name: collector_to_analyzer_container
    #
    restart: always
    #
    environment:
      - SERVICE_PORT=${COLLECTOR_SERVICE_PORT}
      - COLLECTOR_SERVICE_PORT=${COLLECTOR_SERVICE_PORT}
      #
      # Для обращений к RabbitMQ. 172.17.0.1 т.к. разные докеркомпоузы
      - RABBITMQ_HOST=${DOCKER_BRIDGE_IP:-172.17.0.1}
      - RABBITMQ_PORT=${RABBITMQ_DEFAULT_PORT}
      - RABBITMQ_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_VHOST=${RABBITMQ_DEFAULT_VHOST}
      #
      # HTTP порт для healthcheck - внутри Worker Service мини http сервер
      - ASPNETCORE_URLS=http://0.0.0.0:${COLLECTOR_SERVICE_PORT}
      #
      # TCP порт для приёма логов от Nginx
      - COLLECTOR_TCP_PORT=${COLLECTOR_TCP_PORT}
      #
      # Логирование
      - Logging__LogLevel__Default=${LOG_LEVEL:-Information}
      #
      # Адрес nginx откуда читать логи. Тот же докеркомпоуз
      - NGINX_HOST=${NGINX_HOST}
      #
      # Адрес для обращение к редису (чтение заблокированных адресов). Разные докеркомпоузы
      - REDIS_IP=${DOCKER_BRIDGE_IP:-172.17.0.1}:${REDIS_PORT}
    #
    # Лимиты ресурсов
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    #
    volumes:
      # Логи приложения
      - collector_service_logs:/app/logs
    #
    networks:
      - analyzer_network
    #
    #
    # Health check для сервиса
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${COLLECTOR_SERVICE_PORT}/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    #
    # Логи docker контейнера
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    #
    ports:
      # http для хилтчека
      - "${COLLECTOR_SERVICE_PORT}:${COLLECTOR_SERVICE_PORT}"
      # Для TCP от nginx
      - "${COLLECTOR_TCP_PORT}:${COLLECTOR_TCP_PORT}"
  #
  #
  #
  nginx:
    # Блок build - как собирать образ
    build:
      # Путь к докерфайлу
      context: ./nginx
      # Имя докерфайла
      dockerfile: Dockerfile
      # Можно передать аргументы сборки по типу версии образа
      #args:
      #- NGINX_VERSION=1.21-alpine
      #
      # Имя создаваемое при сборке образа
    image: analyzer/nginx_to_analyzer:1.0
    # Имя создаваемого при сборке контейнера
    container_name: nginx_to_analyzer_container
    #
    # Блок с пробросом портов в контейнер
    # Первое - порт хоста, второе - порт внутри контейнера
    ports:
      # HTTP
      - "${NGINX_HOST_PORT:-5172}:${NGINX_PORT:-80}"
      # HTTPS - Пока что не используем
      #- "443:8443"
      #
      # Можно смонтировать папки с хоста в контейнер
      # Уже сделал это в самом докерфайле
      #volumes:
      #- ./nginx/conf.d:/etc/nginx/conf.d:ro #ro - read only
      #
      # Переменные окрежения для конейнера
    environment:
      # Максимальное количество ядер nginx из общего .env
      - NGINX_MAX_CPU=${NGINX_MAX_CPU}
      # Явная передача
      - NGINX_HOST=${NGINX_HOST}
      - NGINX_PORT=${NGINX_PORT}
      # Данные для подключения к Redis
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - COLLECTOR_SERVICE_HOST=collector_service
      - COLLECTOR_TCP_PORT=${COLLECTOR_TCP_PORT}
      - FRONT_HOST=${FRONT_HOST}
      - FRONT_PORT=${FRONT_PORT}
    #
    # Указание от каких контейнеров зависит nginx - чей запуск ожидать 
    # перед собственным
    depends_on:
      collector_service:
        condition: service_healthy
    #
    # Какие сети докеркомпоуза использует контейнер
    networks:
      - analyzer_network
    #
    # Указание места хранения логов. Докер сам создаст volume на хосте
    # Плюс монтирование lua скриптов. ro - только для чтения
    volumes:
      - nginx-logs:/var/log/nginx
      - ./nginx/lua:/etc/nginx/lua:ro
    #
    # Политика перезагрузки
    restart: always
    #
    healthcheck:
      test: ["CMD-SHELL", "/etc/nginx/nginx_healthcheck.sh"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    #
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "traffic-analyzer-nginx"
    #
    # Лимиты ресурсов для высокой нагрузки
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
#
# Описание volumes 
volumes:
  #
  # Логи коллектора
  collector_service_logs:
    name: collector-logs-volume
  #
  # Логи nginx
  nginx-logs:
    name: nginx-logs-volume
#
# Описание сетей
networks:
  analyzer_network:
    # bridge - закрытая сеть на одном хосте. Внутри сети компоуза каждый 
    #   сервис будет иметь свой ip
    # host - без сетевой изоляции. Будет занимать порт адреса хоста
    # overlay - соединяет несколько хостов с Docker между собой
    # macvlan - каждый контейнер будет иметь свой мак адрес, будет как 
    #   отдельный сетевой адаптер в ОС хоста
    # ipvlan - аналог macvlan, только все контейнеры будут иметь общий мак
    # none - полностью отключить сеть для контейнера
    driver: bridge
    #
    # Опционально - параметры сети
    ipam:
      config:
        - subnet: 172.39.0.0/16
