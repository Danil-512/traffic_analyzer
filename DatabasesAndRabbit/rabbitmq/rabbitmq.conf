# Безопасность
# Значения по умолчанию - отключаем гостя
loopback_users.guest = false
# Не указываем default_user/pass здесь - они передаются через переменные окружения Docker

# Сетевые настройки
listeners.tcp.default = 5672
management.tcp.port = 15672
management.tcp.ip   = 0.0.0.0

# Количество сетевых потоков (по числу ядер)
num_acceptors.tcp = 10
socket_recvbuf = 65536
socket_sendbuf = 65536

# Логирование
log.dir = /var/log/rabbitmq
log.file = rabbitmq.log
log.file.level = warning
log.console = false

# Персистентность (критично для анализатора!)
queue_master_locator = min-masters
disk_free_limit.absolute = 2GB

# Настройки виртуального хоста по умолчанию
default_consumer_prefetch = 50